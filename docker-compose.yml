# ====================================================================
# WarpTalk Backend — Docker Compose
# Runs: PostgreSQL + Auth + TranslationRoom + Transcript + Notification + Gateway
# Usage: docker compose up --build
# ====================================================================

services:
  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: warptalk-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - warptalk-net

  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: warptalk-postgres
    environment:
      POSTGRES_DB: warptalk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - warptalk-net

  # ── Auth Service ────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: auth/Dockerfile
    container_name: warptalk-auth
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__AuthDb: "Host=postgres;Port=5432;Database=warptalk;Username=postgres;Password=<REDACTED_DB_PASSWORD>;Search Path=auth,public"
      Jwt__Secret: "REDACTED_JWT_SECRET"
      Jwt__Issuer: "WarpTalk.AuthService"
      Jwt__Audience: "WarpTalk"
    ports:
      - "5101:5101"
      - "50051:50051"
    volumes:
      - auth_dataprotection:/root/.aspnet/DataProtection-Keys
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - warptalk-net

  # ── TranslationRoom Service ─────────────────────────────────────────────────
  translation-room-service:
    build:
      context: .
      dockerfile: translation-room/Dockerfile
    container_name: warptalk-translation-room
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__TranslationRoomDb: "Host=postgres;Port=5432;Database=warptalk;Username=postgres;Password=<REDACTED_DB_PASSWORD>;Search Path=translation_room,public"
      GrpcSettings__AuthServiceUrl: "http://auth-service:50051"
      Jwt__Secret: "REDACTED_JWT_SECRET"
      Jwt__Issuer: "WarpTalk.AuthService"
      Jwt__Audience: "WarpTalk"
    ports:
      - "5102:5102"
      - "50052:50052"
    volumes:
      - translation_room_dataprotection:/root/.aspnet/DataProtection-Keys
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - warptalk-net

  # ── Transcript Service ──────────────────────────────────────────────
  transcript-service:
    build:
      context: .
      dockerfile: transcript/Dockerfile
    container_name: warptalk-transcript
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__TranscriptDb: "Host=postgres;Port=5432;Database=warptalk;Username=postgres;Password=<REDACTED_DB_PASSWORD>;Search Path=transcript,public"
      GrpcUrls__AuthServiceUrl: "http://auth-service:50051"
      GrpcUrls__TranslationRoomServiceUrl: "http://translation-room-service:50052"
      Jwt__Secret: "REDACTED_JWT_SECRET"
      Jwt__Issuer: "WarpTalk.AuthService"
      Jwt__Audience: "WarpTalk"
    ports:
      - "5103:5103"
      - "50053:50053"
    volumes:
      - transcript_dataprotection:/root/.aspnet/DataProtection-Keys
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      translation-room-service:
        condition: service_started
    networks:
      - warptalk-net

  # ── Notification Service ────────────────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: notification/Dockerfile
    container_name: warptalk-notification
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=warptalk;Username=postgres;Password=<REDACTED_DB_PASSWORD>;Search Path=notification,public"
      Jwt__Secret: "REDACTED_JWT_SECRET"
      Jwt__Issuer: "WarpTalk.AuthService"
      Jwt__Audience: "WarpTalk"
    ports:
      - "5104:5104"
      - "50054:50054"
    volumes:
      - notification_dataprotection:/root/.aspnet/DataProtection-Keys
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - warptalk-net

  # ── API Gateway (YARP + SignalR) ────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: gateway/src/WarpTalk.Gateway/Dockerfile
    container_name: warptalk-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://0.0.0.0:5200"
      Jwt__Secret: "REDACTED_JWT_SECRET"
      Jwt__Issuer: "WarpTalk.AuthService"
      Jwt__Audience: "WarpTalk"
      # Redis — shared by SignalR backplane + AI worker streams
      Redis__ConnectionString: "redis:6379"
      SignalR__Redis: "redis:6379"
      # YARP cluster addresses — use Docker service names
      ReverseProxy__Clusters__auth-cluster__Destinations__auth-service__Address: "http://auth-service:5101"
      ReverseProxy__Clusters__translation-room-cluster__Destinations__translation-room-service__Address: "http://translation-room-service:5102"
      ReverseProxy__Clusters__transcript-cluster__Destinations__transcript-service__Address: "http://transcript-service:5103"
      ReverseProxy__Clusters__notification-cluster__Destinations__notification-service__Address: "http://notification-service:5104"
      AllowedOrigins__0: "http://localhost:3000"
      AllowedOrigins__1: "http://localhost:5173"
      AllowedOrigins__2: "https://warptalk.vn"
    ports:
      - "5200:5200"
    volumes:
      - gateway_dataprotection:/root/.aspnet/DataProtection-Keys
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      translation-room-service:
        condition: service_started
      transcript-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - warptalk-net

volumes:
  pgdata:
  redisdata:
  auth_dataprotection:
  translation_room_dataprotection:
  transcript_dataprotection:
  notification_dataprotection:
  gateway_dataprotection:

networks:
  warptalk-net:
    driver: bridge
