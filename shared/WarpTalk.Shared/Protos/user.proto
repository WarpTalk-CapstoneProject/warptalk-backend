syntax = "proto3";

option csharp_namespace = "WarpTalk.Shared.Protos";

package user;

service UserService {
  rpc GetUserById (GetUserRequest) returns (GetUserResponse);
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  string id = 1;
  string email = 2;
  string full_name = 3;
  string avatar_url = 4;
}
