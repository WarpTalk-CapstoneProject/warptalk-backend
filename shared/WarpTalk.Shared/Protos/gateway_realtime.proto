syntax = "proto3";

option csharp_namespace = "WarpTalk.Shared.Protos";

package gateway;

service GatewayRealtimeService {
  rpc PushNewNotification (PushNewNotificationRequest) returns (PushNewNotificationResponse);
}

message PushNewNotificationRequest {
  string id = 1;
  string user_id = 2;
  string type = 3;
  string title = 4;
  string content = 5;
  optional string action_url = 6;
  string payload_json = 7;
  string created_at = 8;
}

message PushNewNotificationResponse {
  bool success = 1;
}
