syntax = "proto3";

option csharp_namespace = "WarpTalk.Shared.Protos";

package meeting;

service MeetingService {
  rpc GetMeetingById (GetMeetingRequest) returns (GetMeetingResponse);
}

message GetMeetingRequest {
  string id = 1;
}

message GetMeetingResponse {
  string id = 1;
  string title = 2;
  string hostId = 3;
}
